name: Build

on:
  push:
    branches: [main, develop]
    tags: ["*"]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: NickelCoverFix
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/pgaskin/nickeltc:1.0

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: true

      - name: Build
        run: make clean all strip koboroot

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: NickelCoverFix
          path: |
            KoboRoot.tgz
            src/libnickelcoverfix.so

  release:
    name: Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download artifact
        uses: actions/download-artifact@v6
        with:
          name: NickelCoverFix

      - name: Extract release notes from CHANGELOG.md
        run: |
          if [ -f CHANGELOG.md ]; then
            awk -v tag="$GITHUB_REF_NAME" '
              $0 == "## " tag { found = 1; next }
              found && /^## /  { exit }
              found            { print }
            ' CHANGELOG.md > release-notes.md
            {
              echo
              echo "---"
              echo
              echo "**Install:** copy \`KoboRoot.tgz\` to the Kobo's hidden \`.kobo\` folder, eject, and reboot. Settings are in \`.adds/nickel-cover-fix/config\`; see the [configuration reference](https://github.com/$GITHUB_REPOSITORY/blob/$GITHUB_REF_NAME/README.md)."
              echo
              echo "**Validation:** this release was validated against Kobo firmware 4.45.23697. Other firmware families require validation before deployment, especially for the optional Repair UI's private Kobo C++ APIs. See the [safety report](https://github.com/$GITHUB_REPOSITORY/blob/$GITHUB_REF_NAME/REPORT.md)."
              echo
              echo "**Uninstall:** delete \`.adds/nickel-cover-fix/uninstall\` and reboot. The mod never writes Kobo's \`.kobo-images\` cache; see the [safety details](https://github.com/$GITHUB_REPOSITORY#boot-safety)."
            } >> release-notes.md
          else
            : > release-notes.md
          fi

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          name: NickelCoverFix ${{ github.ref_name }}
          body_path: release-notes.md
          files: KoboRoot.tgz
